logging:
  file:
    enable: true
    level: info
    path: logs
    rotation: "10 MB"
    retention: "7 days"
  console:
    enable: true
    level: info

db_meta:
  host: localhost
  port: 3306
  user: root
  password: ${env:DB_PASSWORD}
  database: meta

db_dw:
  host: localhost
  port: 3306
  user: root
  password: ${env:DB_PASSWORD}
  database: dw

qdrant:
  host: localhost
  port: 6333
  embedding_size: 1024

embedding:
  host: localhost
  port: 8081
  model: BAAI/bge-large-zh-v1.5

es :
    host: localhost
    port: 9200
    index: data_agent

llm:
  model_name: deepseek-v4-pro
  api_key: ${env:LLM_API_KEY}
  base_url: https://api.deepseek.com